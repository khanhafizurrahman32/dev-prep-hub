<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NeetCode Daily</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0d0f14;--surface:#13161e;--card:#1a1e2a;--border:#252a38;--accent:#4ade80;--accent2:#38bdf8;--accent3:#f472b6;--warn:#fb923c;--text:#e2e8f0;--muted:#64748b}
  html,body{height:100%;background:var(--bg);font-family:'Sora',sans-serif;color:var(--text);overflow-x:hidden}
  body{display:flex;flex-direction:column;min-height:100vh;padding:12px;gap:10px}
  .header{display:flex;align-items:center;justify-content:space-between}
  .hl{display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#000}
  .ht{font-size:15px;font-weight:700;letter-spacing:-.3px}
  .hs{font-size:11px;color:var(--muted);margin-top:1px}
  .streak{display:flex;align-items:center;gap:5px;background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.25);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--warn)}
  .filters{display:flex;gap:6px}
  .fb{flex:1;padding:7px 4px;font-size:11px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;text-align:center;transition:all .2s}
  .fb.fa{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.3);color:var(--accent2)}
  .fb.fe{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.3);color:#4ade80}
  .fb.fm{background:rgba(251,146,60,.12);border-color:rgba(251,146,60,.3);color:var(--warn)}
  .pool{font-size:10px;color:var(--muted);text-align:center}.pool span{color:var(--accent2);font-weight:700}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;animation:su .4s ease}
  @keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .ch{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .cm{display:flex;align-items:center;justify-content:space-between}
  .cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--accent2);background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);padding:3px 8px;border-radius:6px}
  .diff{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px}
  .diff.easy{color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
  .diff.medium{color:var(--warn);background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.2)}
  .title{font-size:16px;font-weight:700;line-height:1.3;letter-spacing:-.3px}
  .desc{font-size:12px;color:#94a3b8;line-height:1.6;padding:10px 14px;border-bottom:1px solid var(--border)}
  .tabs{display:flex;border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:9px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tc{display:none;padding:12px 14px;animation:fi .25s ease}
  .tc.active{display:block}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  .tlist{display:flex;flex-direction:column;gap:9px}
  .titem{display:flex;gap:9px;align-items:flex-start}
  .tnum{width:21px;height:21px;min-width:21px;border-radius:6px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .ttxt{font-size:12px;line-height:1.55;color:#cbd5e1}
  .ttxt strong{color:var(--accent);font-weight:600}
  .ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  .ptag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.2);color:var(--accent3)}
  .codeblock{background:#0a0c12;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .codehdr{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-bottom:1px solid var(--border)}
  .lang{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .cpybtn{font-size:10px;font-weight:600;color:var(--accent2);cursor:pointer;padding:2px 7px;border-radius:4px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);font-family:'Sora',sans-serif}
  pre{padding:11px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.65;color:#94a3b8}
  .kw{color:#c084fc}.fn{color:#38bdf8}.cm{color:#475569;font-style:italic}.str{color:#86efac}.num{color:#fb923c}.var{color:#e2e8f0}
  .cxrow{display:flex;gap:7px;margin-top:12px}
  .cxbox{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px;text-align:center}
  .cxlbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .cxval{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent2)}
  .actions{display:flex;gap:8px;padding-bottom:2px}
  .btnnext{flex:1;background:linear-gradient(135deg,#16a34a,#0ea5e9);border:none;border-radius:13px;padding:13px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:all .2s}
  .btnnext:active{transform:scale(.97);opacity:.9}
  .btnlc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 14px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .prow{display:flex;align-items:center;gap:9px}
  .plbl{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600}
  .pwrap{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
  .pbar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s ease}
  .pcnt{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700}

  .exbox{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:10px 14px 0;display:flex;gap:10px}
  .exside{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
  .exlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
  .exval{font-family:'JetBrains Mono',monospace;font-size:11px;color:#e2e8f0;word-break:break-all;line-height:1.5}
  .exarrow{display:flex;align-items:center;color:var(--muted);font-size:14px;padding-top:14px}
  .exval.out{color:var(--accent)}

  /* ── example box ── */
  .exbox{background:#0a0d13;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:0 14px 10px;display:flex;gap:10px}
  .exside{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
  .exlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
  .exval{font-family:'JetBrains Mono',monospace;font-size:11px;color:#e2e8f0;word-break:break-all;line-height:1.5}
  .exarrow{display:flex;align-items:center;color:var(--muted);font-size:13px;padding-top:14px;flex-shrink:0}
  .exval.out{color:var(--accent)}
  /* ── hint reveal ── */
  .hintbtn{width:100%;padding:9px;background:rgba(74,222,128,.06);border:1px dashed rgba(74,222,128,.25);border-radius:10px;color:var(--muted);font-family:'Sora',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;margin-bottom:2px}
  .hintbtn:hover{background:rgba(74,222,128,.12);color:var(--accent)}
  .hintcontent{display:none}
  .hintcontent.open{display:block}
  /* ── say it aloud ── */
  .saybox{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .saylbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent2);margin-bottom:5px}
  .saytxt{font-size:12px;color:#cbd5e1;line-height:1.6;font-style:italic}
  /* ── mistake ── */
  .mistakebox{background:rgba(251,146,60,.07);border:1px solid rgba(251,146,60,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .mistakelbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--warn);margin-bottom:5px}
  .mistagettxt{font-size:12px;color:#cbd5e1;line-height:1.6}
  /* ── related ── */
  .relbox{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
  .rellbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);width:100%;margin-bottom:2px}
  .reltag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px;background:rgba(196,132,252,.08);border:1px solid rgba(196,132,252,.2);color:#c084fc}
  /* ── solved badge ── */
  /* ── confidence buttons ── */
  .conf-row{display:flex;gap:6px;padding-bottom:2px}
  .cbtn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-family:'Sora',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;letter-spacing:.3px}
  .cbtn:active{transform:scale(.96)}
  .cbtn.again{color:#f87171;border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.08)}
  .cbtn.again.sel,.cbtn.again:hover{background:rgba(248,113,113,.18);border-color:rgba(248,113,113,.5);box-shadow:0 0 12px rgba(248,113,113,.15)}
  .cbtn.shaky{color:#fbbf24;border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.08)}
  .cbtn.shaky.sel,.cbtn.shaky:hover{background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.5);box-shadow:0 0 12px rgba(251,191,36,.15)}
  .cbtn.solid{color:#4ade80;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08)}
  .cbtn.solid.sel,.cbtn.solid:hover{background:rgba(74,222,128,.18);border-color:rgba(74,222,128,.5);box-shadow:0 0 12px rgba(74,222,128,.15)}
  /* streak badge shows solid count */
  .streak{display:flex;align-items:center;gap:5px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;color:#4ade80}
</style>
</head>
<body>
<div class="header">
  <div class="hl">
    <div class="logo">NC</div>
    <div><div class="ht">NeetCode Daily</div><div class="hs">90 Problems · Easy &amp; Medium</div></div>
  </div>
  <div class="streak">🟢<span id="streak">0</span></div>
</div>
<div class="prow">
  <div class="plbl">Today</div>
  <div class="pwrap"><div class="pbar" id="pbar" style="width:0%"></div></div>
  <div class="pcnt"><span id="solved">0</span>/5</div>
</div>
<div class="filters">
  <div class="fb fa" onclick="setFilter('all',this)">All</div>
  <div class="fb" onclick="setFilter('Easy',this)">🟢 Easy</div>
  <div class="fb" onclick="setFilter('Medium',this)">🟠 Medium</div>
</div>
<div class="pool">Pool: <span id="pool">25</span> problems</div>
<div class="card" id="card">
  <div class="ch">
    <div class="cm"><span class="cat" id="cat">Arrays</span><span class="diff" id="diff">Easy</span></div>
    <div class="title" id="title">Loading...</div>
  </div>
  <div class="desc" id="desc"></div>
  <div class="exbox" id="exbox">
    <div class="exside"><div class="exlbl">Input</div><div class="exval" id="exin"></div></div>
    <div class="exarrow">→</div>
    <div class="exside"><div class="exlbl">Output</div><div class="exval out" id="exout"></div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tk',this)">💡 Takeaways</div>
    <div class="tab" onclick="switchTab('ts',this)">🧠 Solution</div>
  </div>
  <div class="tc active" id="tk">
    <button class="hintbtn" id="hintbtn" onclick="toggleHint()">👁 Show Hints &amp; Pattern</button>
    <div class="hintcontent" id="hintcontent">
      <div class="tlist" id="tlist"></div>
      <div class="ptags" id="ptags"></div>
      <div class="saybox" style="margin-top:10px">
        <div class="saylbl">💬 Say it aloud</div>
        <div class="saytxt" id="saytxt"></div>
      </div>
      <div class="mistakebox">
        <div class="mistakelbl">⚠️ Common mistake</div>
        <div class="mistagettxt" id="mktxt"></div>
      </div>
      <div class="relbox">
        <div class="rellbl">🔗 Related problems</div>
        <div id="reltags"></div>
      </div>
    </div>
  </div>
  <div class="tc" id="ts">
    <div class="codeblock">
      <div class="codehdr"><span class="lang">Python</span><button class="cpybtn" onclick="copyCode()">Copy</button></div>
      <pre id="code"></pre>
    </div>
    <div class="cxrow">
      <div class="cxbox"><div class="cxlbl">Time</div><div class="cxval" id="time">O(n)</div></div>
      <div class="cxbox"><div class="cxlbl">Space</div><div class="cxval" id="space">O(1)</div></div>
    </div>
  </div>
</div>
<div class="conf-row">
  <button class="cbtn again" id="cb-again" onclick="rate('again')">🔴 Again</button>
  <button class="cbtn shaky" id="cb-shaky" onclick="rate('shaky')">🟡 Shaky</button>
  <button class="cbtn solid" id="cb-solid" onclick="rate('solid')">🟢 Solid</button>
</div>
<div class="actions">
  <button class="btnnext" onclick="next()">↻ Next Problem</button>
  <button class="btnlc" onclick="openLC()">🔗 LC</button>
</div>
<script>
const P=[
{t:"Contains Duplicate",ca:"Arrays & Hashing",d:"Easy",lc:"contains-duplicate",
desc:"Return true if any value appears at least twice in nums[].",
tk:[
{t:"<strong>HashSet O(1) lookup:</strong> Add each element to a set. Before adding, check if it's already there — that's your duplicate."},
{t:"<strong>One-liner:</strong> return len(nums) != len(set(nums)) — sets drop duplicates automatically."},
{t:"<strong>Foundation pattern:</strong> 'Have I seen this before?' with a hashset appears in Two Sum, Group Anagrams, and dozens more."},
{t:"<strong>Sorting alternative:</strong> Sort then check adjacent — O(n log n) time, O(1) space trade-off."}
],
pt:["HashSet","Array"],
code:`<span class="kw">def</span> <span class="fn">hasDuplicate</span>(<span class="var">self</span>, <span class="var">nums</span>):
    <span class="var">seen</span> = <span class="fn">set</span>()
    <span class="kw">for</span> <span class="var">n</span> <span class="kw">in</span> <span class="var">nums</span>:
        <span class="kw">if</span> <span class="var">n</span> <span class="kw">in</span> <span class="var">seen</span>: <span class="kw">return</span> <span class="kw">True</span>
        <span class="var">seen</span>.<span class="fn">add</span>(<span class="var">n</span>)
    <span class="kw">return</span> <span class="kw">False</span>`,
ex:{i:"nums = [1,2,3,1]",o:"true"},
mk:"Using a list instead of a set makes lookup O(n) — always use set for O(1) membership check.",
say:"I'll iterate through the array adding each element to a hashset, returning true the moment I see a duplicate.",
rel:["Valid Anagram","Two Sum","Longest Consecutive Sequence"],
ti:"O(n)",sp:"O(n)"},

{t:"Two Sum",ca:"Arrays & Hashing",d:"Easy",lc:"two-sum",
desc:"Return indices of the two numbers that add up to target. Exactly one solution exists.",
tk:[
{t:"<strong>Complement trick:</strong> For each num, you need target - num. Check if that complement already exists in a hashmap."},
{t:"<strong>One pass:</strong> Add each number to the map AFTER checking — avoids using the same element twice."},
{t:"<strong>HashMap = O(1) lookup:</strong> Turns the naive O(n²) brute force into O(n)."},
{t:"<strong>Classic pattern:</strong> Any 'find pair with condition' problem likely maps to this hashmap-complement approach."}
],
pt:["HashMap","Array"],
code:`<span class="kw">def</span> <span class="fn">twoSum</span>(<span class="var">self</span>, <span class="var">nums</span>, <span class="var">target</span>):
    <span class="var">seen</span> = {}
    <span class="kw">for</span> <span class="var">i</span>, <span class="var">n</span> <span class="kw">in</span> <span class="fn">enumerate</span>(<span class="var">nums</span>):
        <span class="var">diff</span> = <span class="var">target</span> - <span class="var">n</span>
        <span class="kw">if</span> <span class="var">diff</span> <span class="kw">in</span> <span class="var">seen</span>:
            <span class="kw">return</span> [<span class="var">seen</span>[<span class="var">diff</span>], <span class="var">i</span>]
        <span class="var">seen</span>[<span class="var">n</span>] = <span class="var">i</span>`,
ex:{i:"nums = [2,7,11,15], target = 9",o:"[0,1]"},
mk:"Adding the number to the map BEFORE checking causes using the same index twice for targets like [3,3] sum=6.",
say:"For each number I compute its complement, check if it's already in my hashmap, and if not store the current number with its index.",
rel:["Two Sum II","3Sum","Contains Duplicate"],
ti:"O(n)",sp:"O(n)"},

{t:"Valid Anagram",ca:"Arrays & Hashing",d:"Easy",lc:"valid-anagram",
desc:"Given two strings s and t, return true if t is an anagram of s.",
tk:[
{t:"<strong>Character frequency counts:</strong> Two strings are anagrams if their character counts are identical. Build a count dict for each."},
{t:"<strong>Length check first:</strong> If len(s) != len(t), immediately return False — saves building the counts."},
{t:"<strong>Sorting shortcut:</strong> return sorted(s) == sorted(t) — clean but O(n log n). Frequency counter is O(n)."},
{t:"<strong>Counter subtraction:</strong> Counter(s) - Counter(t) == {} means t covers all characters in s exactly."}
],
pt:["HashMap","String","Sorting"],
code:`<span class="kw">def</span> <span class="fn">isAnagram</span>(<span class="var">self</span>, <span class="var">s</span>, <span class="var">t</span>):
    <span class="kw">if</span> <span class="fn">len</span>(<span class="var">s</span>) != <span class="fn">len</span>(<span class="var">t</span>): <span class="kw">return</span> <span class="kw">False</span>
    <span class="var">cS</span>, <span class="var">cT</span> = {}, {}
    <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">len</span>(<span class="var">s</span>)):
        <span class="var">cS</span>[<span class="var">s</span>[<span class="var">i</span>]] = <span class="num">1</span> + <span class="var">cS</span>.<span class="fn">get</span>(<span class="var">s</span>[<span class="var">i</span>], <span class="num">0</span>)
        <span class="var">cT</span>[<span class="var">t</span>[<span class="var">i</span>]] = <span class="num">1</span> + <span class="var">cT</span>.<span class="fn">get</span>(<span class="var">t</span>[<span class="var">i</span>], <span class="num">0</span>)
    <span class="kw">return</span> <span class="var">cS</span> == <span class="var">cT</span>`,
ex:{i:"s = \"anagram\", t = \"nagaram\"",o:"true"},
mk:"Forgetting the length check first — two strings of different lengths can never be anagrams.",
say:"I'll build character frequency maps for both strings and compare them — equal maps means anagram.",
rel:["Group Anagrams","Permutation in String","Longest Substring Without Repeating Characters"],
ti:"O(n)",sp:"O(n)"},

{t:"Group Anagrams",ca:"Arrays & Hashing",d:"Medium",lc:"group-anagrams",
desc:"Group strings that are anagrams of each other. Return groups in any order.",
tk:[
{t:"<strong>Sorted string as key:</strong> Anagrams share the same sorted form. Use tuple(sorted(word)) as the hashmap key."},
{t:"<strong>defaultdict(list):</strong> Auto-initializes groups without checking key existence first."},
{t:"<strong>Count tuple alternative:</strong> 26-char frequency tuple as key — O(n) per word vs O(n log n) for sorting."},
{t:"<strong>Key insight:</strong> Any two strings producing the same canonical form belong to the same group."}
],
pt:["HashMap","Sorting","String"],
code:`<span class="kw">from</span> collections <span class="kw">import</span> defaultdict

<span class="kw">def</span> <span class="fn">groupAnagrams</span>(<span class="var">self</span>, <span class="var">strs</span>):
    <span class="var">res</span> = <span class="fn">defaultdict</span>(<span class="fn">list</span>)
    <span class="kw">for</span> <span class="var">s</span> <span class="kw">in</span> <span class="var">strs</span>:
        <span class="var">key</span> = <span class="fn">tuple</span>(<span class="fn">sorted</span>(<span class="var">s</span>))
        <span class="var">res</span>[<span class="var">key</span>].<span class="fn">append</span>(<span class="var">s</span>)
    <span class="kw">return</span> <span class="fn">list</span>(<span class="var">res</span>.<span class="fn">values</span>())`,
ex:{i:"strs = [\"eat\",\"tea\",\"tan\",\"ate\",\"nat\",\"bat\"]",o:"[[\"bat\"],[\"nat\",\"tan\"],[\"ate\",\"eat\",\"tea\"]]"},

                    <span class="var">heights</span>[<span class="var">nr</span>][<span class="var">nc</span>]>=<span class="var">heights</span>[<span class="var">r</span>][<span class="var">c</span>]):

code:`<span class="kw">def</span> <span class="fn">canFinish</span>(<span class="var">self</span>, <span class="var">n</span>, <span class="var">prereqs</span>):
    <span class="var">adj</span> = {<span class="var">i</span>:[] <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="var">n</span>)}
    <span class="kw">for</span> <span class="var">a</span>,<span class="var">b</span> <span class="kw">in</span> <span class="var">prereqs</span>: <span class="var">adj</span>[<span class="var">a</span>].<span class="fn">append</span>(<span class="var">b</span>)
    <span class="var">visiting</span> = <span class="fn">set</span>()
    <span class="kw">def</span> <span class="fn">dfs</span>(<span class="var">node</span>):
        <span class="kw">if</span> <span class="var">node</span> <span class="kw">in</span> <span class="var">visiting</span>: <span class="kw">return</span> <span class="kw">False</span>
        <span class="kw">if</span> <span class="var">adj</span>[<span class="var">node</span>]==[]: <span class="kw">return</span> <span class="kw">True</span>
        <span class="var">visiting</span>.<span class="fn">add</span>(<span class="var">node</span>)
        <span class="kw">for</span> <span class="var">nb</span> <span class="kw">in</span> <span class="var">adj</span>[<span class="var">node</span>]:
            <span class="kw">if not</span> <span class="fn">dfs</span>(<span class="var">nb</span>): <span class="kw">return</span> <span class="kw">False</span>
        <span class="var">visiting</span>.<span class="fn">remove</span>(<span class="var">node</span>)
        <span class="var">adj</span>[<span class="var">node</span>]=[]
        <span class="kw">return</span> <span class="kw">True</span>
    <span class="kw">return</span> <span class="fn">all</span>(<span class="fn">dfs</span>(<span class="var">c</span>) <span class="kw">for</span> <span class="var">c</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="var">n</span>))`,

{t:"Missing Number",ca:"Bit Manipulation",d:"Easy",lc:"missing-number",
desc:"Array contains n distinct numbers in range [0, n]. Return the only missing number.",

{t:"<strong>Gauss formula:</strong> Expected sum = n*(n+1)//2. Missing = expected - actual. Clean O(n), O(1)."},

],

],

code:`<span class="kw">def</span> <span class="fn">hammingWeight</span>(<span class="var">self</span>, <span class="var">n</span>):

    <span class="var">dp</span> = [<span class="num">0</span>] * (<span class="var">n</span>+<span class="num">1</span>)

code:`<span class="kw">def</span> <span class="fn">generateParenthesis</span>(<span class="var">self</span>, <span class="var">n</span>):
    <span class="var">res</span>, <span class="var">stack</span> = [], []

            <span class="var">res</span>.<span class="fn">append</span>(<span class="str">""</span>.<span class="fn">join</span>(<span class="var">stack</span>))

            <span class="fn">bt</span>(<span class="var">open</span>, <span class="var">close</span>+<span class="num">1</span>)
            <span class="var">stack</span>.<span class="fn">pop</span>()

        <span class="kw">for</span> <span class="var">j</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="var">C</span>): <span class="var">matrix</span>[<span class="num">0</span>][<span class="var">j</span>]=<span class="num">0</span>
    <span class="kw">if</span> <span class="var">col0</span>:
        <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="var">R</span>): <span class="var">matrix</span>[<span class="var">i</span>][<span class="num">0</span>]=<span class="num">0</span>`,
ex:{i:"matrix = [[1,1,1],[1,0,1],[1,1,1]]",o:"[[1,0,1],[0,0,0],[1,0,1]]"},
mk:"Processing the first row/col as markers before checking their original state — this corrupts the marker data.",

,
{t:"Palindromic Substrings",ca:"1D DP",d:"Medium",lc:"palindromic-substrings",
desc:"Count the number of palindromic substrings in a given string.",
tk:[
{t:"<strong>Expand around center:</strong> Same technique as Longest Palindromic Substring but count every successful expansion step."},
{t:"<strong>2n-1 centers:</strong> n centers for odd-length, n-1 for even-length palindromes — both must be checked."},
{t:"<strong>Increment on every valid expansion:</strong> Each step that passes the left==right check is a valid palindrome — count it."},
{t:"<strong>DP table alternative:</strong> dp[i][j] = True if s[i:j+1] is palindrome — O(n²) space, same time. Expand-around-center is cleaner."}
],
pt:["Two Pointers","String","DP"],
code:`<span class="kw">def</span> <span class="fn">countSubstrings</span>(<span class="var">self</span>, <span class="var">s</span>):
    <span class="var">count</span> = <span class="num">0</span>
    <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="fn">len</span>(<span class="var">s</span>)):
        <span class="kw">for</span> <span class="var">l</span>, <span class="var">r</span> <span class="kw">in</span> [(<span class="var">i</span>,<span class="var">i</span>),(<span class="var">i</span>,<span class="var">i</span>+<span class="num">1</span>)]:
            <span class="kw">while</span> (<span class="var">l</span>&gt;=<span class="num">0</span> <span class="kw">and</span> <span class="var">r</span>&lt;<span class="fn">len</span>(<span class="var">s</span>) <span class="kw">and</span>
                   <span class="var">s</span>[<span class="var">l</span>]==<span class="var">s</span>[<span class="var">r</span>]):
                <span class="var">count</span>+=<span class="num">1</span>
                <span class="var">l</span>-=<span class="num">1</span>; <span class="var">r</span>+=<span class="num">1</span>
    <span class="kw">return</span> <span class="var">count</span>`,
ex:{i:"s = \"aaa\"",o:"6  → a,a,a,aa,aa,aaa"},
mk:"Only expanding from odd centers — even-length palindromes like 'aa' are missed without the (i, i+1) center.",
say:"For each index expand outward for both odd and even centers, incrementing the count on every valid palindrome found during expansion.",
rel:["Longest Palindromic Substring","Longest Common Substring","Manacher's Algorithm"],
ti:"O(n²)",sp:"O(1)"}

,
{t:"Reverse Bits",ca:"Bit Manipulation",d:"Easy",lc:"reverse-bits",
desc:"Reverse the bits of a given 32-bit unsigned integer.",
tk:[
{t:"<strong>Shift and OR loop:</strong> For each of 32 bits: res = (res << 1) | (n & 1), then n >>= 1. Builds the reversed number bit by bit."},
{t:"<strong>Extract LSB, append to result:</strong> n & 1 extracts the rightmost bit. Left-shifting res makes room for each new bit."},
{t:"<strong>Exactly 32 iterations:</strong> Even if n becomes 0 early, keep shifting res left to fill remaining positions correctly."},
{t:"<strong>Python gotcha:</strong> Python ints are unbounded — the result is naturally correct but mask with 0xFFFFFFFF if needed for sign handling."}
],
pt:["Bit Manipulation"],
code:`<span class="kw">def</span> <span class="fn">reverseBits</span>(<span class="var">self</span>, <span class="var">n</span>):
    <span class="var">res</span> = <span class="num">0</span>
    <span class="kw">for</span> <span class="var">_</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">32</span>):
        <span class="var">res</span> = (<span class="var">res</span> &lt;&lt; <span class="num">1</span>) | (<span class="var">n</span> &amp; <span class="num">1</span>)
        <span class="var">n</span> &gt;&gt;= <span class="num">1</span>
    <span class="kw">return</span> <span class="var">res</span>`,
ex:{i:"n = 00000010100101000001111010011100 (binary)",o:"00111001011110000010100101000000 = 964176192"},
mk:"Doing fewer than 32 iterations — stopping when n is 0 misplaces bits in the output.",
say:"32-iteration loop — each step left-shift the result to make room, OR in the lowest bit of n, then right-shift n to process the next bit.",
rel:["Number of 1 Bits","Single Number","Sum of Two Integers"],
ti:"O(1) — 32 iters",sp:"O(1)"}

,
{t:"Single Number",ca:"Bit Manipulation",d:"Easy",lc:"single-number",
desc:"Every element appears twice except one. Find that single element in O(n) time and O(1) space.",
tk:[
{t:"<strong>XOR cancels pairs:</strong> a ^ a = 0 for any a. XOR all elements — duplicates cancel, leaving only the unique one."},
{t:"<strong>Order doesn't matter:</strong> XOR is commutative and associative — all duplicates cancel regardless of their position."},
{t:"<strong>One-liner:</strong> return functools.reduce(operator.xor, nums) — or a simple running XOR in a loop."},
{t:"<strong>Why not HashMap:</strong> HashMap is O(n) space. XOR achieves the same result in O(1) space — always give XOR in interviews."}
],
pt:["Bit Manipulation","Array"],
code:`<span class="kw">def</span> <span class="fn">singleNumber</span>(<span class="var">self</span>, <span class="var">nums</span>):
    <span class="var">res</span> = <span class="num">0</span>
    <span class="kw">for</span> <span class="var">n</span> <span class="kw">in</span> <span class="var">nums</span>:
        <span class="var">res</span> ^= <span class="var">n</span>
    <span class="kw">return</span> <span class="var">res</span>`,
ex:{i:"nums = [4,1,2,1,2]",o:"4"},
mk:"Using a set or counter — those use O(n) space; XOR is the expected O(1) space solution.",
say:"XOR all numbers together — every duplicate pair cancels to zero, leaving only the single number that appeared once.",
rel:["Missing Number","Number of 1 Bits","Single Number II"],
ti:"O(n)",sp:"O(1)"}

,
{t:"Sum of Two Integers",ca:"Bit Manipulation",d:"Medium",lc:"sum-of-two-integers",
desc:"Calculate the sum of two integers a and b without using + or - operators.",
tk:[
{t:"<strong>XOR = sum without carry:</strong> a ^ b gives the bits where exactly one input has a 1 — no carry included."},
{t:"<strong>AND << 1 = carry:</strong> (a & b) << 1 gives the carry bits shifted left to their correct position."},
{t:"<strong>Repeat until no carry:</strong> Set a = a ^ b, b = carry. Repeat until b is 0. Then a is the answer."},
{t:"<strong>Python 32-bit mask:</strong> Python has arbitrary precision — mask with 0xFFFFFFFF each step and convert negatives at the end."}
],
pt:["Bit Manipulation","Math"],
code:`<span class="kw">def</span> <span class="fn">getSum</span>(<span class="var">self</span>, <span class="var">a</span>, <span class="var">b</span>):
    <span class="var">mask</span> = <span class="num">0xFFFFFFFF</span>
    <span class="kw">while</span> <span class="var">b</span> &amp; <span class="var">mask</span>:
        <span class="var">carry</span> = (<span class="var">a</span> &amp; <span class="var">b</span>) &lt;&lt; <span class="num">1</span>
        <span class="var">a</span> = (<span class="var">a</span> ^ <span class="var">b</span>)
        <span class="var">b</span> = <span class="var">carry</span>
    <span class="kw">return</span> <span class="var">a</span> <span class="kw">if</span> <span class="var">b</span> == <span class="num">0</span> <span class="kw">else</span> ~(<span class="var">a</span> ^ <span class="var">mask</span>)`,
ex:{i:"a = 1, b = 2",o:"3"},
mk:"Not masking with 0xFFFFFFFF in Python — Python's arbitrary precision integers cause the while loop to never terminate for negative inputs.",
say:"XOR gives sum without carry, AND shifted left gives the carry — repeat until there's no carry left, masking to 32 bits in Python.",
rel:["Reverse Bits","Single Number","Missing Number"],
ti:"O(1)",sp:"O(1)"}

];
let filter='all', pool=[...P], cur=-1, solvedToday=0;
const MAX=5;

function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.fb').forEach(b=>b.className='fb');
  el.className='fb f'+f[0].toLowerCase();
  pool=f==='all'?P:P.filter(p=>p.d===f);
  document.getElementById('pool').textContent=pool.length;
  next();
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function render(p){
  document.getElementById('title').textContent=p.t;
  document.getElementById('cat').textContent=p.ca;
  const d=document.getElementById('diff');
  d.textContent=p.d; d.className='diff '+p.d.toLowerCase();
  document.getElementById('desc').textContent=p.desc;
  if(p.ex){
    document.getElementById('exbox').style.display='flex';
    document.getElementById('exin').textContent=p.ex.i;
    document.getElementById('exout').textContent=p.ex.o;
  } else {
    document.getElementById('exbox').style.display='none';
  }
  document.getElementById('saytxt').textContent=p.say||'';
  document.getElementById('mktxt').textContent=p.mk||'';
  const rt=document.getElementById('reltags');
  rt.innerHTML=(p.rel||[]).map(r=>`<span class="reltag">${r}</span>`).join('');
  // reset hint to hidden on new problem
  document.getElementById('hintcontent').classList.remove('open');
  document.getElementById('hintbtn').textContent='👁 Show Hints & Pattern';
  // reset solved button
  const lc=pool[cur]?pool[cur].lc:'';
  const conf=JSON.parse(localStorage.getItem('nc_conf')||'{}');
  const rating=conf[lc]||null;
  ['again','shaky','solid'].forEach(r=>{
    const b=document.getElementById('cb-'+r);
    b.className='cbtn '+r+(rating===r?' sel':'');
  });
  document.getElementById('tlist').innerHTML=p.tk.map((t,i)=>
    `<div class="titem"><div class="tnum">${i+1}</div><div class="ttxt">${t.t}</div></div>`).join('');
  document.getElementById('ptags').innerHTML=p.pt.map(t=>`<span class="ptag">${t}</span>`).join('');
  document.getElementById('code').innerHTML=p.code;
  document.getElementById('time').textContent=p.ti;
  document.getElementById('space').textContent=p.sp;
  document.querySelectorAll('.tab')[0].click();
  const c=document.getElementById('card');
  c.style.animation='none';
  requestAnimationFrame(()=>c.style.animation='su .4s ease');
}

function buildWeightedPool(){
  // Again=4x, Shaky=2x, Solid=1x, unrated=4x (treated as Again)
  const conf=JSON.parse(localStorage.getItem('nc_conf')||'{}');
  const weights={again:4,shaky:2,solid:1};
  const weighted=[];
  pool.forEach(p=>{
    const w=weights[conf[p.lc]]||4;
    for(let i=0;i<w;i++) weighted.push(p);
  });
  return weighted;
}

function next(){
  if(!pool.length)return;
  if(solvedToday>=MAX)solvedToday=0;
  const weighted=buildWeightedPool();
  let pick, attempts=0;
  do{
    pick=weighted[Math.floor(Math.random()*weighted.length)];
    attempts++;
  }while(pick===pool[cur]&&pool.length>1&&attempts<20);
  cur=pool.indexOf(pick);
  solvedToday=Math.min(solvedToday+1,MAX);
  document.getElementById('solved').textContent=solvedToday;
  document.getElementById('pbar').style.width=(solvedToday/MAX*100)+'%';
  render(pool[cur]);
}

function copyCode(){
  navigator.clipboard?.writeText(document.getElementById('code').innerText).catch(()=>{});
  const b=document.querySelector('.cpybtn');
  b.textContent='✓'; setTimeout(()=>b.textContent='Copy',1500);
}

function openLC(){
  if(cur>=0)window.open(`https://leetcode.com/problems/${pool[cur].lc}/`,'_blank');
}

document.getElementById('pool').textContent=P.length;
next(); solvedToday=0;
document.getElementById('solved').textContent=0;
document.getElementById('pbar').style.width='0%';
// restore solid count in streak badge on load
const _conf=JSON.parse(localStorage.getItem('nc_conf')||'{}');
document.getElementById('streak').textContent=Object.values(_conf).filter(v=>v==='solid').length;

function toggleHint(){
  const hc=document.getElementById('hintcontent');
  const hb=document.getElementById('hintbtn');
  hc.classList.toggle('open');
  hb.textContent=hc.classList.contains('open')?'🙈 Hide Hints':'👁 Show Hints & Pattern';
}

function rate(level){
  if(cur<0||!pool[cur])return;
  const lc=pool[cur].lc;
  const conf=JSON.parse(localStorage.getItem('nc_conf')||'{}');
  // tap same level again = unrate
  if(conf[lc]===level) delete conf[lc];
  else conf[lc]=level;
  localStorage.setItem('nc_conf',JSON.stringify(conf));
  // update buttons
  ['again','shaky','solid'].forEach(r=>{
    const b=document.getElementById('cb-'+r);
    b.className='cbtn '+r+(conf[lc]===r?' sel':'');
  });
  // streak = solid count
  const solids=Object.values(conf).filter(v=>v==='solid').length;
  document.getElementById('streak').textContent=solids;
}
</script>
