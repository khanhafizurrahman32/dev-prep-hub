<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Case Studies</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Lora:ital,wght@0,400;0,600;1,400&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b0b;
  --ink: #f2ede6;
  --muted: #6b6560;
  --border: #1e1e1e;
  --surface: #131313;

  --tw:  #1d9bf0;
  --ub:  #000000;
  --ub2: #276ef1;
  --wa:  #25d366;
  --yt:  #ff0000;
  --ig:  #e1306c;
  --nf:  #e50914;

  --accent: #f2ede6;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:1000; opacity:0.4;
}

/* ── NAV ── */
nav {
  position:sticky; top:0; z-index:200;
  background: rgba(11,11,11,0.97);
  border-bottom: 1px solid var(--border);
  display:flex; align-items:center; gap:20px;
  padding: 0 40px; height:52px;
}

.back-link {
  font-family:'Azeret Mono',monospace;
  font-size:11px; color:var(--muted);
  text-decoration:none; letter-spacing:1px;
  transition:color .15s;
}
.back-link:hover { color:var(--ink); }

.nav-title {
  font-family:'Anton',sans-serif;
  font-size:18px; letter-spacing:3px;
  color:var(--ink); text-transform:uppercase;
}

.nav-spacer { flex:1; }

.nav-count {
  font-family:'Azeret Mono',monospace;
  font-size:11px; color:var(--muted);
}

/* ── HERO ── */
.hero {
  padding: 80px 40px 60px;
  border-bottom: 1px solid var(--border);
  position:relative; overflow:hidden;
}

.hero-bg {
  position:absolute;
  top:-40px; right:-60px;
  font-family:'Anton',sans-serif;
  font-size:280px; line-height:1;
  color:rgba(255,255,255,0.02);
  pointer-events:none;
  letter-spacing:-10px;
}

.hero-eyebrow {
  font-family:'Azeret Mono',monospace;
  font-size:11px; letter-spacing:3px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:20px;
  display:flex; align-items:center; gap:12px;
}
.hero-eyebrow::before {
  content:'';
  display:inline-block;
  width:32px; height:1px; background:var(--muted);
}

h1 {
  font-family:'Anton',sans-serif;
  font-size:clamp(48px,8vw,96px);
  line-height:0.9; letter-spacing:2px;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:24px;
}

h1 span { color:var(--muted); }

.hero-desc {
  font-size:16px; line-height:1.8;
  color:var(--muted); max-width:560px;
  font-style:italic;
}

/* ── CASE GRID ── */
.case-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
  gap:1px;
  background:var(--border);
  border-bottom: 1px solid var(--border);
}

.case-tile {
  background: var(--bg);
  padding:32px;
  cursor:pointer;
  transition:background .15s;
  position:relative;
  overflow:hidden;
}
.case-tile:hover { background:var(--surface); }

.case-tile-accent {
  position:absolute;
  top:0; left:0; right:0;
  height:2px;
  background:var(--tile-color);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .3s ease;
}
.case-tile:hover .case-tile-accent { transform:scaleX(1); }

.tile-num {
  font-family:'Azeret Mono',monospace;
  font-size:10px; color:var(--muted);
  letter-spacing:2px; margin-bottom:16px;
}

.tile-company {
  font-family:'Anton',sans-serif;
  font-size:32px; letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:8px;
  transition:color .15s;
}
.case-tile:hover .tile-company { color:var(--tile-color); }

.tile-subtitle {
  font-family:'Lora',serif;
  font-style:italic;
  font-size:14px; color:var(--muted);
  margin-bottom:20px;
  line-height:1.5;
}

.tile-tags {
  display:flex; gap:6px; flex-wrap:wrap;
}

.tile-tag {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:1px;
  padding:3px 8px; border-radius:2px;
  border:1px solid var(--border);
  color:var(--muted);
  text-transform:uppercase;
}

.tile-arrow {
  position:absolute;
  bottom:24px; right:24px;
  font-size:20px; color:var(--muted);
  transition:all .2s;
}
.case-tile:hover .tile-arrow {
  color:var(--tile-color);
  transform:translate(4px,-4px);
}

/* ── MODAL ── */
.overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,0.92);
  z-index:500;
  overflow-y:auto;
  animation:fadeIn .2s ease;
}
.overlay.open { display:block; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  max-width:1000px;
  margin:0 auto;
  min-height:100vh;
  background:var(--bg);
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  animation:slideUp .3s ease;
}
@keyframes slideUp {
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* Modal header */
.modal-header {
  padding:40px 48px 32px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0;
  background:var(--bg);
  z-index:10;
  display:flex; align-items:flex-start; gap:20px;
}

.modal-close {
  margin-left:auto;
  background:none; border:none;
  color:var(--muted); font-size:24px;
  cursor:pointer; transition:color .15s;
  font-family:'Azeret Mono',monospace;
  flex-shrink:0;
  padding:4px 8px;
}
.modal-close:hover { color:var(--ink); }

.modal-company {
  font-family:'Anton',sans-serif;
  font-size:clamp(36px,5vw,64px);
  letter-spacing:3px; text-transform:uppercase;
  line-height:1;
}

.modal-tagline {
  font-family:'Lora',serif;
  font-style:italic;
  font-size:15px; color:var(--muted);
  margin-top:6px;
}

/* Step nav */
.step-nav {
  display:flex; gap:0;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border);
  padding:0 48px;
}
.step-nav::-webkit-scrollbar { display:none; }

.step-tab {
  font-family:'Azeret Mono',monospace;
  font-size:10px; letter-spacing:2px;
  padding:14px 20px;
  border:none; background:transparent;
  color:var(--muted); cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  white-space:nowrap;
  transition:all .15s;
  text-transform:uppercase;
}
.step-tab:hover { color:var(--ink); }
.step-tab.active { color:var(--ink); border-bottom-color:var(--modal-color); }

/* Modal body */
.modal-body {
  padding:48px;
}

.step-content { display:none; }
.step-content.active { display:block; animation:fadeIn .2s ease; }

/* Section title */
.sec-title {
  font-family:'Anton',sans-serif;
  font-size:13px; letter-spacing:4px;
  text-transform:uppercase;
  color:var(--modal-color, var(--ink));
  margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}
.sec-title::after {
  content:''; flex:1; height:1px;
  background:var(--border);
}

/* Requirements table */
.req-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px; background:var(--border);
  margin-bottom:40px;
  border:1px solid var(--border);
}
@media(max-width:600px){ .req-grid{grid-template-columns:1fr;} }

.req-cell {
  background:var(--bg);
  padding:20px 24px;
}

.req-cell-title {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:2px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:12px;
}

.req-item {
  display:flex; align-items:flex-start; gap:8px;
  font-size:13px; line-height:1.7; color:var(--ink);
  margin-bottom:6px;
}
.req-item::before {
  content:'·';
  color:var(--modal-color,var(--muted));
  font-size:16px; flex-shrink:0; margin-top:-1px;
}

/* Scale numbers */
.scale-strip {
  display:flex; gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  margin-bottom:40px;
}

.scale-box {
  flex:1; background:var(--bg);
  padding:16px 12px; text-align:center;
}

.scale-val {
  font-family:'Anton',sans-serif;
  font-size:22px; color:var(--ink);
  line-height:1;
}
.scale-val span { font-size:13px; color:var(--muted); }

.scale-lbl {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
  margin-top:4px;
}

/* Architecture diagram */
.arch-wrap {
  border:1px solid var(--border);
  background:var(--surface);
  padding:32px;
  margin-bottom:40px;
  overflow-x:auto;
}

.arch-diagram {
  min-width:500px;
}

/* Component boxes in SVG-like layout */
.arch-boxes {
  display:flex;
  flex-direction:column;
  gap:24px;
}

.arch-row {
  display:flex;
  gap:16px;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}

.arch-box {
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:3px;
  background:var(--bg);
  text-align:center;
  min-width:110px;
  position:relative;
}

.arch-box.highlight {
  border-color:var(--modal-color,#fff);
  box-shadow:0 0 12px rgba(255,255,255,0.05);
}

.arch-box-label {
  font-family:'Azeret Mono',monospace;
  font-size:10px; letter-spacing:1px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:4px;
}

.arch-box-name {
  font-size:12px; font-weight:600;
  color:var(--ink);
}

.arch-arrow {
  font-family:'Azeret Mono',monospace;
  font-size:18px; color:var(--muted);
}

.arch-layer-label {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:2px;
  color:var(--muted); text-transform:uppercase;
  writing-mode:horizontal-tb;
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:2px;
  white-space:nowrap;
}

/* Decision table */
.decision-table {
  width:100%;
  border-collapse:collapse;
  margin-bottom:40px;
  font-size:13px;
}

.decision-table th {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  text-align:left;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  border-top:1px solid var(--border);
}

.decision-table td {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  color:var(--ink); line-height:1.6;
  vertical-align:top;
}

.decision-table tr:last-child td { border-bottom:none; }

.decision-table td:first-child {
  font-family:'Azeret Mono',monospace;
  font-size:11px; color:var(--modal-color,var(--ink));
  white-space:nowrap;
}

/* Deep dive points */
.deep-section {
  margin-bottom:32px;
}

.deep-section h3 {
  font-family:'Lora',serif;
  font-style:italic;
  font-size:20px; color:var(--ink);
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

.deep-section p {
  font-size:14px; line-height:1.9;
  color:rgba(242,237,230,0.8);
  margin-bottom:12px;
}

.deep-section ul {
  list-style:none;
  display:flex; flex-direction:column; gap:8px;
  margin-bottom:12px;
}

.deep-section ul li {
  font-size:13px; line-height:1.7;
  color:rgba(242,237,230,0.75);
  padding-left:20px; position:relative;
}

.deep-section ul li::before {
  content:'→';
  position:absolute; left:0;
  color:var(--modal-color,var(--muted));
  font-family:'Azeret Mono',monospace;
  font-size:11px;
}

.code-block {
  background:#0d0d0d;
  border:1px solid var(--border);
  border-left:2px solid var(--modal-color,var(--muted));
  padding:16px 20px;
  font-family:'Azeret Mono',monospace;
  font-size:11px; line-height:1.8;
  color:#a8d8a8;
  overflow-x:auto;
  white-space:pre;
  margin-bottom:12px;
  border-radius:2px;
}

/* Interview questions */
.interview-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  margin-bottom:40px;
}
@media(max-width:600px){ .interview-grid{grid-template-columns:1fr;} }

.interview-card {
  border:1px solid var(--border);
  padding:16px 20px;
  border-radius:3px;
  background:var(--surface);
}

.int-num {
  font-family:'Azeret Mono',monospace;
  font-size:9px; letter-spacing:2px;
  color:var(--modal-color,var(--muted));
  margin-bottom:8px;
}

.int-q {
  font-size:13px; line-height:1.6;
  color:var(--ink); font-weight:600;
  margin-bottom:6px;
}

.int-hint {
  font-family:'Azeret Mono',monospace;
  font-size:10px; color:var(--muted);
  line-height:1.5;
}

/* Progress dots */
.step-dots {
  display:flex; gap:6px;
  justify-content:center;
  padding:24px 0;
  border-top:1px solid var(--border);
  margin-top:20px;
}

.step-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:var(--border);
  cursor:pointer;
  transition:all .2s;
}
.step-dot.active { background:var(--modal-color,var(--ink)); transform:scale(1.4); }

.step-nav-btns {
  display:flex; gap:12px; justify-content:center;
  padding-bottom:48px;
}

.snav-btn {
  font-family:'Azeret Mono',monospace;
  font-size:11px; letter-spacing:1px;
  padding:10px 24px;
  border:1px solid var(--border);
  background:transparent; color:var(--muted);
  cursor:pointer; border-radius:2px;
  transition:all .15s;
}
.snav-btn:hover { border-color:var(--ink); color:var(--ink); }
.snav-btn.primary {
  background:var(--modal-color,var(--ink));
  border-color:var(--modal-color,var(--ink));
  color:#000;
}
.snav-btn.primary:hover { opacity:0.85; }
</style>
</head>

<nav>
  <a class="back-link" href="index.html">← hub</a>
  <div class="nav-title">System Design · Case Studies</div>
  <div class="nav-spacer"></div>
  <div class="nav-count">5 companies · 25 decisions</div>
</nav>

<div class="hero">
  <div class="hero-bg">SD</div>
  <div class="hero-eyebrow">system design interview</div>
  <h1>Design<br><span>at</span><br>Scale</h1>
  <p class="hero-desc">Five real-world system design walkthroughs. Requirements → scale estimation → architecture → deep dives → interview questions. The exact format used in FAANG interviews.</p>
</div>

<div class="case-grid" id="caseGrid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <div>
        <div class="modal-company" id="modalCompany"></div>
        <div class="modal-tagline" id="modalTagline"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="step-nav" id="stepNav"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const CASES = [
{
  id:'twitter', company:'Twitter / X', color:'#1d9bf0',
  tagline:'Design a social network supporting 300M daily active users',
  tags:['Feed Generation','Fan-out','NoSQL','CDN','WebSockets'],
  scale:{ users:'300M DAU', tweets:'500M/day', reads:'100B/day', storage:'10TB/day' },
  steps:[
    {
      id:'req', label:'Requirements',
      functional:['Post tweets (text, images, video)','Follow / unfollow users','Home timeline (tweets from followed users)','Like, retweet, reply','Search tweets','Trending topics','Notifications (real-time)'],
      nonFunctional:['High availability (99.99%)','Timeline load < 200ms','Eventual consistency acceptable for feed','Read-heavy: 100:1 read/write ratio','Global CDN for media'],
    },
    {
      id:'scale', label:'Scale Estimate',
      calcs:[
        { label:'Tweets/sec', val:'~6K', sub:'500M/day ÷ 86,400' },
        { label:'Timeline reads/sec', val:'~1.2M', sub:'100B/day ÷ 86,400' },
        { label:'Media storage/yr', val:'~3.6PB', sub:'10TB/day × 365' },
        { label:'Tweet storage/yr', val:'~18TB', sub:'300 bytes × 500M × 365' },
        { label:'Bandwidth', val:'~10Gbps', sub:'Media reads peak' },
        { label:'Cache hit target', val:'99%', sub:'For timeline reads' },
      ]
    },
    {
      id:'arch', label:'Architecture',
      layers:[
        { label:'Client', boxes:['iOS / Android', 'Web Browser'] },
        { label:'Edge', boxes:['CDN (CloudFront)', 'Load Balancer'] },
        { label:'API', boxes:['Tweet Service', 'Timeline Service', 'User Service', 'Search Service'] },
        { label:'Cache', boxes:['Redis Cluster (Timeline)', 'Memcached (User)'] },
        { label:'Queue', boxes:['Kafka (Fan-out)', 'Kafka (Notifications)'] },
        { label:'Storage', boxes:['MySQL (Users)', 'Cassandra (Tweets)', 'S3 (Media)', 'Elasticsearch (Search)'] },
      ],
      decisions:[
        { component:'Tweet Storage', choice:'Cassandra', why:'Write-heavy, wide rows per user, auto-sharding by user_id, tunable consistency' },
        { component:'Timeline Cache', choice:'Redis Sorted Set', why:'score=timestamp, fast O(log n) push/pop, TTL-based eviction' },
        { component:'Fan-out', choice:'Hybrid Push/Pull', why:'Push for regular users (<1K followers), Pull for celebrities (10M+ followers)' },
        { component:'Media', choice:'S3 + CloudFront CDN', why:'Offload bandwidth, edge caching, global distribution' },
        { component:'Search', choice:'Elasticsearch', why:'Full-text inverted index, ranking by recency + engagement score' },
        { component:'Real-time', choice:'WebSockets via Socket.io', why:'Persistent connection for notifications, <100ms push latency' },
      ]
    },
    {
      id:'deep', label:'Deep Dives',
      sections:[
        {
          title:'Timeline Generation: Push vs Pull vs Hybrid',
          body:'The hardest problem in Twitter\'s design. Pure push: on tweet, fan-out to all followers\' Redis caches. Fast reads (O(1)), but celebrities with 10M followers cause write amplification. Pure pull: compute timeline on request from followed users\' tweets. No write amplification but O(n) reads per request. Hybrid: push for users with <1K followers (95% of users), pull+merge for celebrities. Cache timelines as Redis sorted sets (score=tweet_id, member=tweet_json).',
          code:`-- Fan-out worker (Kafka consumer)\nfor follower_id in get_followers(tweet.user_id):\n    if follower_count(follower_id) < 1000:  # push\n        redis.zadd(f"timeline:{follower_id}",\n                   {tweet_id: timestamp})\n        redis.zremrangebyrank(f"timeline:{follower_id}", 0, -801)  # keep 800\n    # celebrities: skip push, merge at read time`,
        },
        {
          title:'Sharding Strategy for Tweets',
          body:'Shard by user_id (hash-based). All tweets from one user on same shard — enables efficient user timeline queries. Use consistent hashing so adding shards only moves ~1/n data. Each shard is a Cassandra node with replication factor 3. Hot users (celebrities) are a hotspot — handle by read replicas and caching.',
          code:`-- Cassandra tweet table\nCREATE TABLE tweets (\n    user_id   BIGINT,\n    tweet_id  TIMEUUID,    -- encodes timestamp\n    content   TEXT,\n    media_url TEXT,\n    PRIMARY KEY (user_id, tweet_id)\n) WITH CLUSTERING ORDER BY (tweet_id DESC)\n  AND default_time_to_live = 7776000;  -- 90 days`,
        },
        {
          title:'Trending Topics',
          body:'Use a sliding window counter over the last hour. Each tweet is parsed for hashtags and incremented in a Redis sorted set. A background job every 30 seconds aggregates top-K hashtags. For global trending, aggregate across regional Redis clusters. Approximate counting (Count-Min Sketch) reduces memory for long-tail hashtags.',
          code:`-- Trending: Redis sorted set\nredis.zincrby("trending:2026050610", 1, "#WorldCup")\nredis.expire("trending:2026050610", 3600)\n\n-- Top 10 trending\nredis.zrevrange("trending:2026050610", 0, 9, withscores=True)`,
        },
      ]
    },
    {
      id:'interview', label:'Interview Q&A',
      questions:[
        { q:'How do you handle the celebrity problem (Kylie Jenner has 400M followers)?', hint:'Hybrid fan-out: pull for celebrities, push for normal users' },
        { q:'How do you ensure timeline consistency when a user follows many celebrities?', hint:'Merge pull results at read time, cache merged result briefly' },
        { q:'How would you scale to 1 billion users?', hint:'Multi-region active-active, geo-sharding, regional Kafka clusters' },
        { q:'How do you implement "who to follow" recommendations?', hint:'Graph DB (Neo4j), friend-of-friend BFS, ML collaborative filtering' },
        { q:'How do you handle tweet deletion for GDPR?', hint:'Soft delete, async CDC to propagate, CDN purge API' },
        { q:'How would you design Twitter search?', hint:'Elasticsearch, inverted index on tweet tokens, relevance = recency + engagement' },
      ]
    },
  ]
},
{
  id:'uber', company:'Uber', color:'#276ef1',

      <div class="tile-subtitle">${c.tagline}</div>
      <div class="tile-tags">${c.tags.map(t=>`<span class="tile-tag">${t}</span>`).join('')}</div>
      <div class="tile-arrow">↗</div>
    `;
    tile.onclick = () => openCase(c);
    grid.appendChild(tile);
  });
}

// ─────────────────────────────────────────────
// OPEN CASE
// ─────────────────────────────────────────────
function openCase(c) {
  activeCase = c;
  activeStep = 0;
  document.getElementById('modal').style.setProperty('--modal-color', c.color);
  document.getElementById('modalCompany').textContent = c.company;
  document.getElementById('modalCompany').style.color = c.color;
  document.getElementById('modalTagline').textContent = c.tagline;

  // Build step nav
  const nav = document.getElementById('stepNav');
  nav.innerHTML = '';
  c.steps.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'step-tab' + (i===0?' active':'');
    btn.textContent = s.label;
    btn.onclick = () => goToStep(i);
    nav.appendChild(btn);
  });

  renderStep(c, 0);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function goToStep(idx) {
  activeStep = idx;
  document.querySelectorAll('.step-tab').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderStep(activeCase, idx);
  document.getElementById('modal').scrollTo({top:0, behavior:'smooth'});
}

function renderStep(c, stepIdx) {
  const step = c.steps[stepIdx];
  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  const color = c.color;
  let html = '';

  if(step.id === 'req') {
    html = `
      <div class="sec-title">Functional Requirements</div>
      <div class="req-grid">
        <div class="req-cell">
          <div class="req-cell-title">Must Have</div>
          ${step.functional.map(f=>`<div class="req-item">${f}</div>`).join('')}
        </div>
        <div class="req-cell">
          <div class="req-cell-title">Non-Functional</div>
          ${step.nonFunctional.map(f=>`<div class="req-item">${f}</div>`).join('')}
        </div>
      </div>
    `;
  }

  else if(step.id === 'scale') {
    html = `
      <div class="sec-title">Back-of-Envelope Estimates</div>
      <div class="scale-strip">
        ${Object.entries(c.scale).map(([k,v])=>`
          <div class="scale-box">
            <div class="scale-val">${v}</div>
            <div class="scale-lbl">${k}</div>
          </div>`).join('')}
      </div>
      <div class="sec-title">Derived Calculations</div>
      <div class="scale-strip" style="flex-wrap:wrap">
        ${step.calcs.map(calc=>`
          <div class="scale-box" style="flex:0 0 calc(33% - 1px);min-width:130px">
            <div class="scale-val">${calc.val}</div>
            <div class="scale-lbl">${calc.label}</div>
            <div style="font-family:'Azeret Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px">${calc.sub}</div>
          </div>`).join('')}
      </div>
    `;
  }

  else if(step.id === 'arch') {
    html = `
      <div class="sec-title">System Architecture</div>
      <div class="arch-wrap">
        <div class="arch-boxes">
          ${step.layers.map(layer=>`
            <div class="arch-row">
              <div class="arch-layer-label">${layer.label}</div>
              ${layer.boxes.map(b=>`
                <div class="arch-box ${layer.label==='Services'||layer.label==='API'?'highlight':''}">
                  <div class="arch-box-name">${b}</div>
                </div>`).join('')}
            </div>`).join('<div class="arch-row"><div class="arch-arrow" style="transform:rotate(90deg)">↓</div></div>')}
        </div>
      </div>
      <div class="sec-title">Key Design Decisions</div>
      <table class="decision-table">
        <thead><tr><th>Component</th><th>Choice</th><th>Rationale</th></tr></thead>
        <tbody>
          ${step.decisions.map(d=>`
            <tr>
              <td>${d.component}</td>
              <td style="font-family:'Azeret Mono',monospace;font-size:11px;color:${color}">${d.choice}</td>
              <td style="color:rgba(242,237,230,0.7)">${d.why}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    `;
  }

  else if(step.id === 'deep') {
    html = `
      <div class="sec-title">Deep Dive</div>
      ${step.sections.map(s=>`
        <div class="deep-section">
          <h3>${s.title}</h3>
          <p>${s.body}</p>
          ${s.code ? `<div class="code-block">${s.code}</div>` : ''}
        </div>`).join('')}
    `;
  }

  else if(step.id === 'interview') {
    html = `
      <div class="sec-title">Interview Questions</div>
      <div class="interview-grid">
        ${step.questions.map((q,i)=>`
          <div class="interview-card">
            <div class="int-num">Q${String(i+1).padStart(2,'0')}</div>
            <div class="int-q">${q.q}</div>
            <div class="int-hint">💡 ${q.hint}</div>
          </div>`).join('')}
      </div>
    `;
  }

  // Step nav dots + buttons
  html += `
    <div class="step-dots">
      ${c.steps.map((_,i)=>`<div class="step-dot ${i===stepIdx?'active':''}" onclick="goToStep(${i})"></div>`).join('')}
    </div>
    <div class="step-nav-btns">
      ${stepIdx > 0 ? `<button class="snav-btn" onclick="goToStep(${stepIdx-1})">← ${c.steps[stepIdx-1].label}</button>` : '<div></div>'}
      ${stepIdx < c.steps.length-1 ? `<button class="snav-btn primary" onclick="goToStep(${stepIdx+1})">→ ${c.steps[stepIdx+1].label}</button>` : ''}
    </div>
  `;

  body.innerHTML = html;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
  if(!activeCase) return;
  if(e.key === 'ArrowRight' && activeStep < activeCase.steps.length-1) goToStep(activeStep+1);
  if(e.key === 'ArrowLeft' && activeStep > 0) goToStep(activeStep-1);
});

init();
</script>
</body>
</html>
