<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 System Design Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2230;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a259ff;
    --text: #c9d1d9;
    --dim: #6e7681;
    --white: #f0f6fc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 24px 40px;
    border-bottom: 1px solid var(--border);
  }

  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 16px;
  }

  h1 span {
    color: var(--accent);
    -webkit-text-stroke: 1px var(--accent);
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    max-width: 500px;
    margin: 0 auto 32px;
    line-height: 1.8;
  }

  /* Search & filter */
  .controls {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 18px;
    pointer-events: none;
  }

  input[type="search"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 16px 10px 40px;
    border-radius: 4px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--accent); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.06);
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    z-index: 100;
    transition: width 0.3s;
    width: 0%;
  }

  /* Main grid */
  .grid-wrap {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  .card {
    background: var(--bg);
    padding: 28px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 0;
    background: var(--accent);
    transition: height 0.3s;
  }

  .card:hover { background: var(--surface); }
  .card:hover::after { height: 100%; }

  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: var(--dim);
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    background: rgba(255,255,255,0.04);
    color: var(--dim);
    border: 1px solid var(--border);
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 40px;
    position: relative;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .modal-close:hover { color: var(--white); }

  .modal-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .modal-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 6px;
  }

  .modal-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 24px;
  }

  .modal-body h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 24px 0 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .modal-body p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
  }

  .modal-body ul {
    list-style: none;
    margin-top: 8px;
  }

  .modal-body ul li {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
    padding-left: 18px;
    position: relative;
  }

  .modal-body ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent2);
  }

  .code-block {
    background: #0d1117;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent3);
    padding: 16px;
    margin-top: 10px;
    border-radius: 2px;
    overflow-x: auto;
  }

  .code-block pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #a8d8a8;
  }

  .modal-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 24px;
    padding: 10px 20px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .modal-link:hover {
    background: rgba(0,229,255,0.15);
  }

  /* counter */
  .stats {
    position: relative; z-index: 1;
    display: flex;
    gap: 40px;
    justify-content: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .hidden { display: none !important; }

  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 32px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
  <div class="tag">// system design</div>
  <h1>30 Concepts.<br><span>One Reference.</span></h1>
  <p class="subtitle">A structured guide to the most critical system design topics every backend engineer must know.</p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num">30</div><div class="stat-label">Concepts</div></div>
  <div class="stat"><div class="stat-num">8</div><div class="stat-label">Categories</div></div>
  <div class="stat"><div class="stat-num" id="visibleCount">30</div><div class="stat-label">Showing</div></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="search concepts..." oninput="filterCards()">
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('api', this)" style="--fc:#00e5ff">APIs</button>
    <button class="filter-btn" onclick="setFilter('database', this)">Database</button>
    <button class="filter-btn" onclick="setFilter('caching', this)">Caching</button>
    <button class="filter-btn" onclick="setFilter('architecture', this)">Architecture</button>
    <button class="filter-btn" onclick="setFilter('messaging', this)">Messaging</button>
    <button class="filter-btn" onclick="setFilter('reliability', this)">Reliability</button>
    <button class="filter-btn" onclick="setFilter('network', this)">Network</button>
  </div>
</div>

<div class="grid-wrap" id="cardGrid"></div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer>built from 30 blogs · system design reference · 2026</footer>

<script>
const CATEGORIES = {
  api:          { label: 'APIs & Communication',  color: '#00e5ff' },
  database:     { label: 'Databases',             color: '#a259ff' },
  caching:      { label: 'Caching',               color: '#ff6b35' },
  architecture: { label: 'Architecture',          color: '#4caf50' },
  messaging:    { label: 'Messaging & Events',    color: '#ffeb3b' },
  reliability:  { label: 'Reliability',           color: '#f44336' },
  network:      { label: 'Networking',            color: '#2196f3' },
  misc:         { label: 'Misc / Algorithms',     color: '#e91e63' },
};

const CONCEPTS = [
  {
    num: 1, title: 'APIs',
    cat: 'api', url: 'https://lnkd.in/dsbwPZ6N',
    summary: 'The contract between services — how they talk to each other.',
    tags: ['REST', 'HTTP', 'contract'],
    what: 'An API (Application Programming Interface) is a set of rules that lets two software programs communicate. It defines what requests can be made, how to make them, and the data format for requests and responses.',
    why: 'APIs are the backbone of modern software. Without them, microservices, mobile apps, and third-party integrations wouldn\'t exist. Every feature you use online is powered by APIs behind the scenes.',
    keyPoints: ['APIs define a contract — callers don\'t care how the server works internally', 'REST, GraphQL, gRPC are the main styles', 'APIs use HTTP verbs: GET, POST, PUT, DELETE, PATCH', 'Versioning (v1, v2) ensures backward compatibility', 'Authentication (OAuth, API keys) protects endpoints'],
    example: `// REST API call example\nGET /api/v1/users/42\nAuthorization: Bearer <token>\n\n// Response\n{ "id": 42, "name": "Riad", "role": "developer" }`,
    interview: 'What\'s the difference between REST and RPC? When would you pick GraphQL over REST?',
  },
  {
    num: 2, title: 'API Gateways',
    cat: 'api', url: 'https://lnkd.in/gtyXmvf4',
    summary: 'Single entry point that routes, authenticates, and throttles all API traffic.',
    tags: ['routing', 'auth', 'rate-limit'],
    what: 'An API Gateway is a server that acts as the front door for all client requests to your backend microservices. It handles cross-cutting concerns so individual services don\'t have to.',
    why: 'In a microservices architecture, clients shouldn\'t talk directly to 20 different services. The gateway provides a single, consistent interface and removes duplication of auth, logging, and rate limiting.',
    keyPoints: ['Authentication & authorization (JWT validation)', 'Rate limiting and throttling', 'Request routing to correct microservice', 'SSL termination', 'Response caching', 'Load balancing across service instances', 'Examples: AWS API Gateway, Kong, Nginx, Envoy'],
    example: `Client → API Gateway → /users → UserService\n                    → /orders → OrderService\n                    → /payment → PaymentService\n\n// Gateway handles: auth, rate-limit, logging`,
    interview: 'How does an API gateway differ from a reverse proxy? What is the BFF (Backend for Frontend) pattern?',
  },
  {
    num: 3, title: 'JWTs',
    cat: 'api', url: 'https://lnkd.in/ghtXYRqU',
    summary: 'Stateless, self-contained tokens for secure information transmission.',
    tags: ['auth', 'token', 'stateless'],
    what: 'JSON Web Token (JWT) is a compact, URL-safe token format for representing claims securely between two parties. It has 3 parts: Header.Payload.Signature.',
    why: 'Traditional session auth requires server-side storage. JWTs are stateless — the token itself contains user info, so any server can verify it without a database lookup. Perfect for distributed systems.',
    keyPoints: ['Three parts: Header (alg), Payload (claims), Signature', 'Signed with a secret (HS256) or private key (RS256)', 'Claims: iss, sub, exp, iat, aud', 'Access tokens are short-lived (15 min); refresh tokens are long-lived', 'Tokens cannot be revoked without a denylist — this is a known drawback'],
    example: `// JWT Structure\neyJhbGciOiJIUzI1NiJ9     ← Header\n.eyJzdWIiOiIxMjMifQ==    ← Payload\n.SflKxwRJSMeKKF2Q        ← Signature\n\n// Spring Security filter checks signature on every request`,
    interview: 'How do you invalidate a JWT before expiry? What\'s the difference between access and refresh tokens?',
  },
  {
    num: 4, title: 'Webhooks',
    cat: 'api', url: 'https://lnkd.in/geHxGX-7',
    summary: 'Event-driven HTTP callbacks — "don\'t call us, we\'ll call you."',
    tags: ['event-driven', 'callback', 'push'],
    what: 'A webhook is an HTTP POST request sent automatically by a service to a URL you register, triggered by a specific event. Instead of polling, the sender pushes data to you.',
    why: 'Polling wastes resources. Webhooks enable real-time event processing: payment confirmations, git push notifications, IoT sensor updates. They\'re the foundation of event-driven integration.',
    keyPoints: ['Register a URL endpoint to receive events', 'Validate payloads using HMAC signatures', 'Return 2xx quickly; process async to avoid timeouts', 'Handle duplicate delivery (idempotency)', 'Implement retry logic on your consumer', 'Examples: Stripe, GitHub, Slack all use webhooks'],
    example: `// Your Spring Boot webhook receiver\n@PostMapping("/webhook/payment")\npublic ResponseEntity<?> handle(\n  @RequestHeader("X-Signature") String sig,\n  @RequestBody PaymentEvent event) {\n  verifySignature(sig); // security!\n  processAsync(event);\n  return ResponseEntity.ok().build(); // respond fast!\n}`,
    interview: 'How do you ensure exactly-once webhook processing? How do you debug missed webhooks?',
  },
  {
    num: 5, title: 'REST vs GraphQL',
    cat: 'api', url: 'https://lnkd.in/gM5VHKQS',
    summary: 'REST: multiple fixed endpoints. GraphQL: one flexible endpoint, ask for what you need.',
    tags: ['REST', 'GraphQL', 'query'],
    what: 'REST exposes multiple URLs per resource with fixed response shapes. GraphQL exposes a single endpoint where clients specify exactly what data they need using a query language.',
    why: 'REST over-fetches (too much data) or under-fetches (too many round trips). GraphQL solves both by letting clients declare their data needs. Critical for mobile apps where bandwidth matters.',
    keyPoints: ['REST: /users/1, /users/1/posts (multiple trips)', 'GraphQL: one query, nested relationships in one request', 'GraphQL has strong typing via Schema Definition Language', 'N+1 query problem is a classic GraphQL pitfall → use DataLoader', 'REST is simpler to cache; GraphQL caching is complex', 'Use REST for simple CRUD; GraphQL for complex, nested data needs'],
    example: `# GraphQL query - get exactly what you need\nquery {\n  user(id: "1") {\n    name\n    posts { title createdAt }\n    followers { count }\n  }\n}`,
    interview: 'When would you choose GraphQL over REST? How do you handle authorization in GraphQL resolvers?',
  },
  {
    num: 6, title: 'Load Balancing',
    cat: 'architecture', url: 'https://lnkd.in/gvxfwEUr',
    summary: 'Distribute traffic across multiple servers to prevent any single point of failure.',
    tags: ['traffic', 'horizontal-scale', 'availability'],
    what: 'A load balancer distributes incoming network traffic across multiple backend servers using algorithms like Round Robin, Least Connections, or IP Hash.',
    why: 'A single server has limits. Load balancing enables horizontal scaling — add more servers to handle more traffic. It also enables zero-downtime deployments and automatic failover.',
    keyPoints: ['Layer 4 (TCP/IP) vs Layer 7 (HTTP) load balancers', 'Algorithms: Round Robin, Least Connections, IP Hash, Weighted', 'Health checks remove unhealthy instances automatically', 'Session affinity (sticky sessions) for stateful apps', 'Examples: AWS ALB/NLB, Nginx, HAProxy', 'Active-passive vs active-active HA setups'],
    example: `// Round Robin distribution\nRequest 1 → Server A\nRequest 2 → Server B\nRequest 3 → Server C\nRequest 4 → Server A (cycle)\n\n// If Server B fails health check:\nRequest 1 → Server A\nRequest 2 → Server C  (B skipped)`,
    interview: 'What\'s the difference between L4 and L7 load balancing? How does sticky session work and when is it a problem?',
  },
  {
    num: 7, title: 'Proxy vs Reverse Proxy',
    cat: 'network', url: 'https://lnkd.in/gMTtidBq',
    summary: 'Forward proxy hides the client; reverse proxy hides the server.',
    tags: ['proxy', 'nginx', 'security'],
    what: 'A forward proxy sits in front of clients (e.g., a corporate proxy). A reverse proxy sits in front of servers, intercepting client requests on their behalf.',
    why: 'Reverse proxies are everywhere in production: they handle SSL termination, caching, compression, and routing — keeping your application servers simple and secure.',
    keyPoints: ['Forward Proxy: client → proxy → internet (client anonymity, content filtering)', 'Reverse Proxy: internet → proxy → server (server anonymity, security)', 'Nginx, Caddy, and HAProxy are common reverse proxies', 'Handles SSL/TLS termination (offloads crypto from app server)', 'Can serve static files and cache responses', 'Used for A/B testing and canary deployments'],
    example: `# Nginx reverse proxy config\nserver {\n  listen 443 ssl;\n  server_name api.example.com;\n\n  location / {\n    proxy_pass http://localhost:8080;  # Spring Boot\n    proxy_set_header Host $host;\n  }\n}`,
    interview: 'How is a reverse proxy different from an API gateway? Can Nginx act as both a load balancer and reverse proxy?',
  },
  {
    num: 8, title: 'Scalability',
    cat: 'architecture', url: 'https://lnkd.in/gPGhW-qK',
    summary: 'The ability of a system to handle increased load by adding resources.',
    tags: ['horizontal', 'vertical', 'scale-out'],
    what: 'Scalability is how well a system can handle growing demand. Vertical scaling adds more power to existing machines. Horizontal scaling adds more machines.',
    why: 'Every successful system eventually hits capacity limits. Designing for scalability from the start avoids costly rewrites later. Horizontal scaling is the foundation of cloud architecture.',
    keyPoints: ['Vertical scaling (scale up): bigger CPU/RAM — has a ceiling', 'Horizontal scaling (scale out): more servers — almost limitless', 'Stateless services scale horizontally easily', 'Database scaling: read replicas, sharding, partitioning', 'Auto-scaling groups in cloud (AWS ASG, K8s HPA)', 'Measure: throughput (req/s), latency (p99), resource utilization'],
    example: `// Vertical: t3.micro → t3.2xlarge\n// Horizontal: 1 instance → 10 instances behind LB\n\n// For horizontal scaling, your app must be stateless:\n// Store sessions in Redis, not in-memory\n// Store files in S3, not local disk`,
    interview: 'What makes a service hard to scale horizontally? How would you scale a chat application to 1 million users?',
  },
  {
    num: 9, title: 'Availability',
    cat: 'reliability', url: 'https://lnkd.in/gQk2p4_6',
    summary: 'The percentage of time a system is operational and accessible.',
    tags: ['uptime', 'SLA', 'nines'],
    what: 'Availability is measured as uptime percentage. "Five nines" (99.999%) allows only ~5 minutes downtime per year. It\'s achieved through redundancy, failover, and eliminating SPOFs.',
    why: 'Downtime costs money. For e-commerce, every minute offline is lost revenue. High availability requires architectural decisions: redundant components, health checks, and graceful degradation.',
    keyPoints: ['99% = 87.6h downtime/year; 99.9% = 8.7h; 99.99% = 52min; 99.999% = 5min', 'Achieved via: redundancy, failover, load balancing, replication', 'Active-active: both nodes serve traffic', 'Active-passive: standby takes over if primary fails', 'Health checks detect failures automatically', 'Chaos engineering (Netflix Chaos Monkey) tests resilience'],
    example: `// Availability = Uptime / (Uptime + Downtime)\n// For SLA 99.9%:\n// Allowed downtime = 365 * 24 * 60 * 0.001 = 525 minutes/year\n// ≈ 8.7 hours per year\n\n// To achieve this: deploy 2+ instances,\n// health checks every 30s, auto-replace unhealthy`,
    interview: 'What\'s the tradeoff between availability and consistency (CAP theorem)? How do you achieve HA for a stateful database?',
  },
  {
    num: 10, title: 'SPOF',
    cat: 'reliability', url: 'https://lnkd.in/gw_uHZWn',
    summary: 'Single Point of Failure — any component whose failure brings down the whole system.',
    tags: ['failure', 'redundancy', 'resilience'],
    what: 'A Single Point of Failure is a component that, if it fails, causes the entire system to stop working. Eliminating SPOFs is the core goal of high-availability design.',

    example: `// Dhaka coordinates\nlat = 23.8103, lng = 90.4125\ngeohash = "hscx9e" (6-char ≈ 1km precision)\n\n// Find all drivers within ~1km of rider\nSELECT * FROM drivers\nWHERE geohash LIKE 'hscx9%'\n-- Fast B-tree index scan on string prefix!`,
    interview: 'Why do you need to check adjacent geohash cells for proximity queries? How does Redis GEORADIUS work internally?',
  },
];

let currentFilter = 'all';

function getCatColor(cat) {
  return CATEGORIES[cat]?.color || '#888';
}

function renderCards(data) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  data.forEach(c => {
    const col = getCatColor(c.cat);
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.cat = c.cat;
    div.innerHTML = `
      <div class="card-num">// ${String(c.num).padStart(2,'0')}</div>
      <div class="card-title">
        <span class="cat-dot" style="background:${col}"></span>
        ${c.title}
      </div>
      <div class="card-summary">${c.summary}</div>
      <div class="card-tags">${c.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
    `;
    div.onclick = () => openModal(c);
    grid.appendChild(div);
  });
  document.getElementById('visibleCount').textContent = data.length;
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = CONCEPTS.filter(c => {
    const matchFilter = currentFilter === 'all' || c.cat === currentFilter;
    const matchSearch = !q || c.title.toLowerCase().includes(q) || c.summary.toLowerCase().includes(q) || c.tags.some(t => t.toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });
  renderCards(filtered);
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function openModal(c) {
  const col = getCatColor(c.cat);
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-num">concept ${String(c.num).padStart(2,'0')} · <span style="color:${col}">${CATEGORIES[c.cat]?.label || c.cat}</span></div>
    <div class="modal-title">${c.title}</div>
    <div class="modal-cat">${c.tags.map(t=>`<span class="chip" style="border-color:${col};color:${col}">${t}</span>`).join(' ')}</div>
    <div class="modal-body">
      <h3>What is it?</h3>
      <p>${c.what}</p>
      <h3>Why does it matter?</h3>
      <p>${c.why}</p>
      <h3>Key points</h3>
      <ul>${c.keyPoints.map(k=>`<li>${k}</li>`).join('')}</ul>
      <h3>Example</h3>
      <div class="code-block"><pre>${c.example}</pre></div>
      <h3>Interview angle</h3>
      <p style="color:#ffeb3b">${c.interview}</p>
      <a class="modal-link" href="${c.url}" target="_blank">↗ Read full blog post</a>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// Progress bar on scroll
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
});

// Init
renderCards(CONCEPTS);
</script>
</body>
</html>
